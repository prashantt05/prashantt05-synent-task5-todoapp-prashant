<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo-List</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="todo-app">
        <h1>To-Do List</h1>
        <input placeholder="Add your Task..." />
        <button class="btn">Add Task</button>

        <div class="Todo-List">
          <ul>
            <li>Eat <button class="dltbtn">Delete</button></li>
            <li>Sleep<button class="dltbtn">Delete</button></li>
          </ul>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
